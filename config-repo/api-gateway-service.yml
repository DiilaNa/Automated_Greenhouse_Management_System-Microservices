server:
  port: 8080

jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
          routes:
            - id: auth-service
              uri: http://104.211.95.241:8080
              predicates:
                - Path=/auth/**
              filters:
                - RewritePath=/auth/(?<segment>.*), /api/auth/${segment}

            - id: zone-service
              uri: lb://ZONE-SERVICE
              predicates:
                - Path=/api/zones/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/