server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"

      routes:
        - id: zone-service
          uri: lb://ZONE-SERVICE
          predicates:
            - Path=/api/v1/zones/**
          filters:
            - AuthenticationFilter

        - id: sensor-service
          uri: lb://SENSOR-SERVICE
          predicates:
            - Path=/api/v1/sensors/**
          filters:
            - AuthenticationFilter

        - id: automation-service
          uri: lb://AUTOMATION-SERVICE
          predicates:
            - Path=/api/v1/automations/**
          filters:
            - AuthenticationFilter

        - id: crop-service
          uri: lb://CROP-SERVICE
          predicates:
            - Path=/api/v1/crops/**
          filters:
            - AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
